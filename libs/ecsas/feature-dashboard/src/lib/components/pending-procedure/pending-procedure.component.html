<div>
  <div class="py-6 border-b border-slate-100 flex justify-between items-center">
    <h2 class="font-bold text-[#1A365D]">Procédures en cours</h2>
    <button class="text-sm font-semibold text-[#3182CE] hover:underline">
      Voir tout
    </button>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
      <lib-pending-procedure-card 
          icon="pi pi-building"
          title="Appel des Layennes"
          description="Aide sociale exceptionnelle destinée aux pèlerins et résidents pour la célébration annuelle."
          status="ouvert"
          [count]="3">
      </lib-pending-procedure-card>

      <lib-pending-procedure-card 
          icon="pi pi-heart"
          title="Secours Médical"
          description="Prise en charge des frais d'hospitalisation et d'achat de médicaments pour les nécessiteux."
          status="ouvert"
          [count]="4">
      </lib-pending-procedure-card>

      <lib-pending-procedure-card 
          icon="pi pi-money-bill"
          title="Aide Tabaski 2024"
          description="Soutien aux familles vulnérables pour l'achat du bélier de la Tabaski."
          status="clôturé"
          [count]="0">
      </lib-pending-procedure-card>

  </div>
</div>
