<div class="group bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-[#3182CE] hover:shadow-md transition-all flex flex-col">
    <div class="p-6">
        <div class="flex justify-between items-start mb-4">
            <div class="p-3 bg-blue-50 rounded-xl text-[#3182CE] group-hover:bg-[#3182CE] group-hover:text-white transition-colors">
                <i [class]="icon"></i>
            </div>
            @if (status === 'ouvert') {
                <span class="px-2 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold uppercase tracking-wider rounded border border-emerald-100">Ouvert</span>
            } @else if (status === 'clôturé') {
                <span class="px-2 py-1 bg-slate-100 text-slate-500 text-[10px] font-bold uppercase tracking-wider rounded border border-slate-200">Clôturé</span>
            }
        </div>
        <h3 class="text-lg font-bold text-slate-800">{{ title }}</h3>
        <p class="text-sm text-slate-500 mt-2 leading-relaxed line-clamp-2">{{ description }}</p>

        <div class="mt-4 pt-4 border-t border-slate-50 space-y-2">
            <div class="flex items-center text-xs text-slate-400">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                {{ count }} documents requis
            </div>
            <div class="flex items-center text-xs text-slate-400">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Workflow : 7 étapes
            </div>
        </div>
    </div>
    @if (status === 'ouvert') {
        <div class="px-6 py-4 bg-slate-50 rounded-b-2xl border-t border-slate-100 mt-auto">
            <button class="px-4 w-full bg-[#1A365D] hover:bg-blue-800 text-white text-sm font-bold py-2 rounded-lg transition shadow-sm">
                Enclencher la procédure
            </button>
        </div>
    } @else {
        <div class="px-6 py-4 bg-slate-50 rounded-b-2xl border-t border-slate-100 mt-auto">
            <button disabled class="w-full bg-slate-300 text-white text-sm font-bold py-2 rounded-lg cursor-not-allowed">
                Procédure indisponible
            </button>
        </div>
    }
</div>
