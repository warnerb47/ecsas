<button type="button" class="px-4 w-full text-sm font-medium py-3 rounded-lg transition shadow-sm"
    [ngClass]="{
        'text-white bg-[#1A365D] hover:bg-blue-800': type() === 'primary',
        'bg-white border border-slate-200 text-slate-700 hover:bg-slate-50': type() === 'secondary',
    }">
    <ng-content></ng-content>
</button>
