<div>
    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">
        {{label()}}
    </label>
    <div class="flex">
        <span class="inline-flex items-center px-3 rounded-l-xl border border-r-0 border-slate-200 bg-slate-100 text-slate-500 text-sm">
            {{phonePrefix()}}
        </span>
        <input class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-r-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
            type="tel" [placeholder]="placeholder()" [value]="value()" (input)="value.set($event.target.value)">
    </div>
</div>
