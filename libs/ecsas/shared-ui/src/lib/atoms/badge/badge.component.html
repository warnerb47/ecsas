<span class="px-2 py-1 text-[10px] font-bold uppercase tracking-wider border"
    [ngClass]="{
        'bg-emerald-50 text-emerald-700 border-emerald-100': type === 'primary',
        'bg-slate-100 text-slate-500 border-slate-200': type === 'secondary',
        'rounded-full': rounded,
        'rounded': !rounded
    }">
    <ng-content></ng-content>
</span>
