<div>
    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">
        {{label()}}
    </label>
    <div class="flex">
        <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-l-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
            [type]="visible() ? 'text' : 'password'"
            [placeholder]="placeholder()" [value]="value()" (input)="value.set($event.target.value)">
        <span class="inline-flex items-center px-3 rounded-r-xl border border-l-0 border-slate-200 bg-slate-100 text-slate-500 cursor-pointer" (click)="toggleVisibility()" (keydown.enter)="toggleVisibility()">
            <i class="pi pi-eye"></i>
        </span>
    </div>
</div>
