<div>
    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">
        {{label()}}
    </label>
    <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
        type="date" [placeholder]="placeholder()" [value]="value()" (input)="setValue($event.target.value)">
    <!-- Internal Error Display -->
    @if (invalid() && touched()) {
      <div class="text-red-500 text-xs mt-1">
        @for (error of errors(); track error.kind) {
          <span>{{ error.message }}</span>
        }
      </div>
    }
</div>
