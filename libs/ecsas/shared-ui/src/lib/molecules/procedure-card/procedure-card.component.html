<div class="h-full group bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-[#3182CE] hover:shadow-md transition-all flex flex-col">
    <div class="p-6">
        <div class="flex justify-between items-start mb-4">
            <div class="p-3 bg-blue-50 rounded-xl text-[#3182CE] group-hover:bg-[#3182CE] group-hover:text-white transition-colors">
                <i class="{{procedure().icon ?? 'pi pi-file'}}"></i>
            </div>
            @if (!procedure().deleted) {
                <lib-badge type="primary">Active</lib-badge>
            } @else {
                <lib-badge type="secondary">Clôturé</lib-badge>
            }
        </div>
        <h3 class="text-lg font-bold text-slate-800">{{ procedure().name }}</h3>
        <p class="text-sm text-slate-500 mt-2 leading-relaxed line-clamp-3">{{ procedure().description }}</p>

        <div class="mt-4 pt-4 border-t border-slate-50 space-y-2">
          @if (procedure().documents?.length) {
            @for (document of procedure().documents; track $index) {
              <div class="flex items-center text-xs text-slate-400">
                  <i class="pi pi-file mr-2"></i>
                  <span>{{document.name}}</span>
              </div>
            }
          }@else {
              <div class="flex items-center justify-center h-full text-xs text-slate-300">
                  <span>Aucun document configuré</span>
              </div>
          }
        </div>
    </div>
    <div class="px-6 py-4 bg-slate-50 rounded-b-2xl border-t border-slate-100 mt-auto">
        <lib-button type="primary" (click)="onProcedureSelected()">
            Voir détails
        </lib-button>
    </div>
</div>
