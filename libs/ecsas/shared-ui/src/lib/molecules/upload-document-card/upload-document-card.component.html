@if (fileName()) {
  <div class="flex items-center justify-between p-4 border-2 border-dashed border-emerald-200 rounded-2xl bg-emerald-50/30 transition-all">
    <div class="flex items-center text-emerald-600">
      <div class="w-10 h-10 bg-emerald-50 rounded flex items-center justify-center mr-4">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
        </svg>
      </div>
      <div>
        <p class="text-sm font-bold text-slate-700">{{ documentName() }}</p>
        <p class="text-[10px] text-emerald-600 font-bold uppercase">Fichier téléchargé : {{ fileName() }}</p>
      </div>
    </div>
    <button type="button" (click)="onModify()" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition">Modifier</button>
  </div>
} @else {
  <div class="flex items-center justify-between p-4 border-2 border-dashed border-slate-100 rounded-2xl hover:bg-blue-50/50 hover:border-blue-200 transition-all cursor-pointer group">
    <div class="flex items-center">
      <div class="w-10 h-10 bg-white shadow-sm border border-slate-100 rounded flex items-center justify-center text-blue-600 mr-4 group-hover:scale-110 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
      </div>
      <div>
        <p class="text-sm font-bold text-slate-700">{{ documentName() }}</p>
        <p class="text-[10px] text-slate-400 font-medium uppercase">{{ formatHint() }}</p>
      </div>
    </div>
    <button type="button" (click)="onUpload()" class="text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-lg group-hover:bg-blue-600 group-hover:text-white transition">Scanner / Upload</button>
  </div>
}
