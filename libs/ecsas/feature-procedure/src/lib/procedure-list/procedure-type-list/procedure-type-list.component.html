<div class="flex flex-col space-y-4">
  @for (procedureType of procedureTypes(); track $index) {
    @if(procedureType.isEditing){
      <div class="flex items-center justify-between space-x-6 border-b border-slate-200 py-2">
        <input #input class="w-full py-3 px-4 bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-gray-200 outline-none rounded-lg"
          type="text" value="{{procedureType.label}}">
        <button (click)="submtEdit(input.value, procedureType, $index)" class="rounded-lg font-medium text-sm transition shrink-0">
          <i class="pi pi-send text-blue-500 rotate-45"></i>
        </button>
      </div>
    }@else {
      <div class="flex items-center justify-between border-b border-slate-200 py-2 group">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center">
              <i class="{{procedureType?.icon ?? 'pi pi-tag'}}"></i>
            </div>
            <div>{{procedureType.label}}</div>
        </div>
        <div class="flex space-x-6 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
          <button (click)="onEdit(procedureType, $index)" class="rounded-lg font-medium text-sm transition shrink-0">
            <i class="pi pi-pencil"></i>
          </button>
          <button class="rounded-lg font-medium text-sm transition shrink-0">
            <i class="pi pi-trash text-red-500"></i>
          </button>
        </div>
      </div>
    }
  }
</div>
