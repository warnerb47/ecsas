<div class="flex-1 flex flex-col overflow-hidden">
    <lib-topbar [breadcrumbItems]="breadcrumbItems" searchPlaceholder="Rechercher une demande ou un bénéficiaire...">
      <lib-button routerLink="/procedure/new-procedure" type="primary">
        <i class="pi pi-plus"></i>
        Nouvelle procédure
      </lib-button>
    </lib-topbar>

    <div class="flex-1 overflow-y-auto p-8 bg-slate-50/50">
        <div class="max-w-6xl mx-auto">

            <div class="mb-10">
                <h2 class="text-3xl font-bold text-[#1A365D]">Catalogue des Procédures</h2>
                <p class="text-slate-500 mt-2">Sélectionnez une procédure pour enclencher un nouveau dossier de demande.</p>
            </div>

            <lib-tabs [tabs]="tabs" [activeTabInput]="activeTab" (activeTabChange)="onTabChange($event)"></lib-tabs>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                @for (procedure of procedures; track procedure.id) {
                    <lib-procedure-card [procedure]="procedure" (procedureSelected)="onProcedureSelected($event)">
                    </lib-procedure-card>
                }
            </div>
        </div>
    </div>
</div>
