<div class="flex-1 flex flex-col overflow-hidden">
    <lib-topbar [breadcrumbItems]="breadcrumbItems" searchPlaceholder="Rechercher une demande ou un bénéficiaire...">
        <lib-button (click)="editProcedure()" routerLink="/procedure/new-procedure" type="secondary">
          <div class="flex items-center justify-center space-x-2">
            <i class="pi pi-file-edit"></i>
            <span>Modifier procédure</span>
          </div>
        </lib-button>
    </lib-topbar>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-7xl mx-auto">
                <lib-application-statistics [cards]="statCards"></lib-application-statistics>
                <lib-application-table></lib-application-table>
            </div>
        </div>
    </div>
</div>
