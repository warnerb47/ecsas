<div class="bg-white border border-slate-200 rounded-xl p-5 flex items-center">
    <div class="w-12 h-12 rounded-full flex items-center justify-center mr-4"
         [ngClass]="[card.iconBgColor, card.iconTextColor]">
        <i [class]="card.iconClass" class="text-xl"></i>
    </div>
    <div>
        <p class="text-xs font-bold text-slate-400 uppercase">{{ card.label }}</p>
        <h4 class="text-2xl font-black text-[#1A365D]">{{ card.value }}</h4>
    </div>
</div>
